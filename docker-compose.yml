version: "3.8"

services:
  # ---- Base de données ----
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: masterconnect
      POSTGRES_USER: masterconnect
      POSTGRES_PASSWORD: masterconnect_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masterconnect"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Backend Django ----
  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://masterconnect:masterconnect_dev@db:5432/masterconnect
      - DEBUG=True
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ---- Frontend Next.js ----
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  pgdata: