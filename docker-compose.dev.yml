version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: masterconnect
      POSTGRES_USER: masterconnect
      POSTGRES_PASSWORD: masterconnect_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://masterconnect:masterconnect_dev@db:5432/masterconnect
      - DEBUG=True
    depends_on:
      - db
    volumes:
      - ./backend:/app

  # En dev, on lance le frontend en mode hot-reload SANS Docker
  # → tu lances juste "cd frontend && npm run dev" en local

volumes:
  pgdata: